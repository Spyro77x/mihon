<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Το Manga Μου</title>
    <style>
        body { background-color: #121212; color: white; text-align: center; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .manga-container { max-width: 800px; margin: 0 auto; }
        .manga-page { width: 100%; display: block; margin-bottom: 10px; }
        select { padding: 10px; background: #333; color: white; border: 1px solid #555; font-size: 16px; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Όνομα Manga</h1>
    
    <!-- Μπάρα Επιλογής Κεφαλαίων -->
    <select onchange="location = this.value;">
        <option value="index.html" selected>Κεφάλαιο 1</option>
        <option value="index.html" selected>Κεφάλαιο 2</option>
    </select>

    <div class="manga-container">
        <!-- Αν οι εικόνες σου έχουν άλλη μορφή π.χ. .png, άλλαξέ το παρακάτω -->
        <img class="manga-page" src="manga/Crimson Hunt/Chapter 1/0001-2.png" alt="Page 1">
        <img class="manga-page" src="manga/Crimson Hunt/Chapter 1/0002.png" alt="Page 2">
        <img class="manga-page" src="manga/Crimson Hunt/Chapter 1/0003.png" alt="Page 3">
        <img class="manga-page" src="manga/Crimson Hunt/Chapter 1/0004.png" alt="Page 4">
        <img class="manga-page" src="manga/Crimson Hunt/Chapter 1/0005.png" alt="Page 5">
        <img class="manga-page" src="manga/Crimson Hunt/Chapter 1/0006.png" alt="Page 6">
        <img class="manga-page" src="manga/Crimson Hunt/Chapter 1/0007.png" alt="Page 7">
        <img class="manga-page" src="manga/Crimson Hunt/Chapter 1/0008.png" alt="Page 8">
        <img class="manga-page" src="manga/Crimson Hunt/Chapter 1/0009.png" alt="Page 9">
        <img class="manga-page" src="manga/Crimson Hunt/Chapter 1/0010.png" alt="Page 10">
    </div>

</body>
</html>
